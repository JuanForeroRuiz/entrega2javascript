<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Entrega 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="../Entrega2/img/iconoPagina.png">
</head>

<body>
    <header>
        <h1 id="tituloTienda" class="fw-bold mb-4 mt-3">Market JR</h1>
        <h2 class="fw-bolder mb-3">¡Hola<span id="displayUsuario"></span>!</h2>
        <p class="fw-semibold">Bienvenido a tu carrito de compras en Market JR.</p>
    </header>


    <h3 id="tituloAgregarProducto" class="fw-bold">Agregar productos</h3>
    <div class="productos mb-3">
        <input type="text" id="inputArticulo" placeholder="Nombre del producto">
        <input type="number" id="inputValor" placeholder="Precio unitario">
        <button id="btnRegistrar" class="btn btn-primary">Agregar producto</button>
    </div>

    <h3 id="tituloLista" class="fw-bold">Lista de productos</h3>
    <p class="fw-semibold">Los productos que agregues a tu lista de mercado las verás aquí debajo.</p>

    <button id="btnOrdenar" class="btn btn-warning mb-4 fw-semibold" onclick="organizarPorCosto()">
        Ordenar por valor (Menor a Mayor)
    </button>

    <ul id="contenedorInventario"></ul>

    <div class="mt-3 p-2 bg-light border rounded">
        <h4 class="fw-bold">Total del carrito: $<span id="displayTotal">0</span></h4>
    </div>

    <script src="JS/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
