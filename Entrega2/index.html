<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrega 2</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


</head>

<body>

    <h1 id="tituloTienda" class="fw-bold mb-4 mt-3">Market JR</h1>
    <h2 id="saludo" class="fw-bolder mb-3">¡Hola<span id="nombreIngresado"></span>!</h2>

    <p class="fw-semibold">Bienvenido a tu carrito de compras en Market JR.</p>

    <h3 id="tituloAgregarProducto" class="fw-bold">Agregar productos</h3>

    <div class="productos mb-3">
        <input type="text" id="nombreProducto" placeholder="Ingresa tu producto">

        <input type="number" id="precioProducto" placeholder="Ingresa el precio">

        <button id="agregarProducto" class="btn btn-primary">Agregar al carrito</button>

    </div>
    <h3 id="tituloLista" class="fw-bold">Lista de productos</h3>
    <p class="fw-semibold">Los productos que agregues a tu lista de mercado las verás aquí debajo.</p>
    <button id="ordenarPrecio" class="btn btn-warning mt-2 ms-4 mb-4 fw-semibold" onclick="ordenarPorPrecio()">
        Ordenar por precio (Menor a Mayor)
    </button>
    <div class="listadeProductos">
        <ul id="listaProductos"></ul>
    </div>
    <div class="mt-3 p-2 bg-light border rounded">
        <h4 class="fw-bold">Total a pagar: $<span id="totalCarrito">0</span></h4>
    </div>









    <script src="JS/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
